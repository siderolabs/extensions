# commit to be tagged for new release
commit = "HEAD"

project_name = "Talos System Extensions"
github_repo = "siderolabs/extensions"
match_deps = "^github.com/((talos-systems|siderolabs)/[a-zA-Z0-9-]+)$"

# previous release
previous = "v1.13.0"

pre_release = true

preface = """\
See [Talos Linux documentation](https://docs.siderolabs.com/talos/v1.14/build-and-extend-talos/custom-images-and-development/system-extensions) for information on using system extensions.
"""

[notes]

    [notes.updates]
        title = "Component Updates"
        description = """\
ctr: 2.3.1
cloudflared: 2026.5.0
px-fuse: 4adf0ebb418f0142f65b3d23a38c6b93219099ed
util-linux: 2.42.0
tenstorrent: 2.8.0
NVIDIA LTS: 580.159.04
NVIDIA Production: 595.71.05
DRBD: 9.3.2
Amazon ENA: 2.17.0
xdma-driver: a78e645
crun: 1.27.1
gvisor: 20260427.0
kata-containers: 3.31.0
spin: 0.24.0
netbird: 0.71.2
newt: 1.12.5
mdadm: 4.6
qemu-guest-agent: 11.0.0
ZFS: 2.4.2
linux-firmware: 20260519
intel-ucode: 20260512
cloud-provider-aws: v1.36.0
lldpd: 1.0.22
tailscale: 1.98.2
"""

[make_deps]

    [make_deps.tools]
        variable = "TOOLS"
        repository = "github.com/siderolabs/tools"

    [make_deps.pkgs]
        variable = "PKGS"
        repository = "github.com/siderolabs/pkgs"
