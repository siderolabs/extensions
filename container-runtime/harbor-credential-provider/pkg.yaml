name: harbor-credential-provider
variant: scratch
shell: /bin/bash
dependencies:
  - stage: base
steps:
  - sources:
      - url: https://github.com/container-registry/harbor-workload-identity-federation/archive/refs/tags/{{ .HARBOR_WIF_VERSION }}.tar.gz
        destination: harbor-workload-identity-federation.tar.gz
        sha256: {{ .HARBOR_WIF_SHA256 }}
        sha512: {{ .HARBOR_WIF_SHA512 }}
    env:
      GOPATH: /tmp/go
    cachePaths:
      - /.cache/go-build
      - /tmp/go/pkg
  - network: default
    prepare:
      - |
        mkdir -p ${GOPATH}/src/github.com/container-registry/harbor-workload-identity-federation

        tar -xzf harbor-workload-identity-federation.tar.gz --strip-components=1 -C ${GOPATH}/src/github.com/container-registry/harbor-workload-identity-federation
      - |
        cd ${GOPATH}/src/github.com/container-registry/harbor-workload-identity-federation
        go mod download
  - network: none
    build:
      - |
        CGO_ENABLED=0 go build \
          -C ${GOPATH}/src/github.com/container-registry/harbor-workload-identity-federation \
          -o ./dist/harbor-credential-provider \
          -ldflags "-s -w \
                   -X main.version={{ .VERSION }}" \
          ./cmd/credential-provider-harbor
    install:
      - install -D -m 0755
        ${GOPATH}/src/github.com/container-registry/harbor-workload-identity-federation/dist/harbor-credential-provider
        /rootfs/usr/local/lib/kubelet/credentialproviders/harbor-credential-provider
    test:
      - |
        mkdir -p /extensions-validator-rootfs
        cp -r /rootfs/ /extensions-validator-rootfs/rootfs
        cp /pkg/manifest.yaml /extensions-validator-rootfs/manifest.yaml
        /extensions-validator validate --rootfs=/extensions-validator-rootfs --pkg-name="${PKG_NAME}"
    sbom:
      outputPath: /rootfs/usr/local/share/spdx/harbor-credential-provider.spdx.json
      version: {{ .HARBOR_WIF_VERSION }}
      licenses:
        - Apache-2.0
finalize:
  - from: /rootfs
    to: /rootfs
  - from: /pkg/manifest.yaml
    to: /
