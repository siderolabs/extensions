name: kata-containers
variant: scratch
shell: /bin/bash
dependencies:
  - stage: base
steps:
  - sources:
    # {{ if eq .ARCH "aarch64" }} This in fact is YAML comment, but Go templating instruction is evaluated by bldr
      - url: https://github.com/kata-containers/kata-containers/releases/download/{{ .KATA_CONTAINERS_VERSION }}/kata-static-{{ .KATA_CONTAINERS_VERSION }}-arm64.tar.zst
        destination: kata-static.tar.zst
        sha256: {{ .KATA_CONTAINERS_STATIC_ARM64_SHA256 }}
        sha512: {{ .KATA_CONTAINERS_STATIC_ARM64_SHA512 }}
    # {{ else }} This in fact is YAML comment, but Go templating instruction is evaluated by bldr
      - url: https://github.com/kata-containers/kata-containers/releases/download/{{ .KATA_CONTAINERS_VERSION }}/kata-static-{{ .KATA_CONTAINERS_VERSION }}-amd64.tar.zst
        destination: kata-static.tar.zst
        sha256: {{ .KATA_CONTAINERS_STATIC_AMD64_SHA256 }}
        sha512: {{ .KATA_CONTAINERS_STATIC_AMD64_SHA512 }}
    # {{ end }} This in fact is YAML comment, but Go templating instruction is evaluated by bldr
      - url: https://github.com/kata-containers/kata-containers/archive/refs/tags/{{ .KATA_CONTAINERS_VERSION }}.tar.gz
        destination: kata-containers.tar.gz
        sha256: {{ .KATA_CONTAINERS_SHA256 }}
        sha512: {{ .KATA_CONTAINERS_SHA512 }}
    env:
      GOPATH: /tmp/go
    cachePaths:
      - /.cache/go-build
      - /tmp/go/pkg
  - network: default
    prepare:
      - |
        mkdir -p kata-static
        tar xf kata-static.tar.zst -C kata-static
      - |
        mkdir -p ${GOPATH}/src/github.com/kata-containers
        tar -xzf kata-containers.tar.gz --strip-components=1 -C ${GOPATH}/src/github.com/kata-containers
      - |
        cd ${GOPATH}/src/github.com/kata-containers/src/runtime
        go mod download
  - network: none
    build:
      - |
        cd ${GOPATH}/src/github.com/kata-containers
        PREFIX=/usr/local make -C src/runtime SKIP_GO_VERSION_CHECK=y containerd-shim-v2
    install:
      - |
        cd kata-static

        mkdir -p /rootfs/usr/local/{bin,libexec,share/kata-containers}

        cp ./opt/kata/bin/cloud-hypervisor /rootfs/usr/local/bin/
        cp ./opt/kata/libexec/virtiofsd /rootfs/usr/local/libexec/

        cp ./opt/kata/share/kata-containers/kata-containers.img /rootfs/usr/local/share/kata-containers/kata-containers.img
        cp ./opt/kata/share/kata-containers/vmlinux.container /rootfs/usr/local/share/kata-containers/vmlinux.container
      - |
        cd ${GOPATH}/src/github.com/kata-containers/src/runtime
        cp containerd-shim-kata-v2 /rootfs/usr/local/bin/containerd-shim-kata-v2
      - |
        mkdir -p /rootfs/etc/cri/conf.d
        cp /pkg/10-kata-containers.part /rootfs/etc/cri/conf.d/10-kata-containers.part

        mkdir -p /rootfs/usr/local/share/kata-containers
        cp /pkg/configuration.toml /rootfs/usr/local/share/kata-containers/
      - |
        cd kata-static

        qemu={{ if eq .ARCH "aarch64" }}qemu-system-aarch64{{ else }}qemu-system-x86_64{{ end }}
        cp ./opt/kata/bin/${qemu} /rootfs/usr/local/bin/${qemu}
        strip /rootfs/usr/local/bin/${qemu}

        mkdir -p /rootfs/usr/local/share/kata-qemu
        cp -a ./opt/kata/share/kata-qemu/qemu /rootfs/usr/local/share/kata-qemu/qemu
        rm -f /rootfs/usr/local/share/kata-qemu/qemu/edk2-*.fd
        rm -rf /rootfs/usr/local/share/kata-qemu/qemu/firmware
        # ROMs for platforms kata's q35/virt machines never use (hppa, ppc, s390, arm boards)
        rm -f /rootfs/usr/local/share/kata-qemu/qemu/{hppa-firmware*.img,s390-*.img,slof.bin,vof*.bin,qemu_vga.ndrv,pnv-pnor.bin,*_bootrom.bin,qemu-nsis.bmp}

        # kata builds QEMU with --disable-relocatable, so the firmware search path is
        # hardcoded to /opt/kata/share/kata-qemu/qemu. QEMU still consults
        # <exec_dir>/qemu-bundle/<compiled path> first; route that back to the datadir
        mkdir -p /rootfs/usr/local/bin/qemu-bundle/opt/kata/share/kata-qemu
        ln -s ../../../../../../share/kata-qemu/qemu /rootfs/usr/local/bin/qemu-bundle/opt/kata/share/kata-qemu/qemu
        # {{ if eq .ARCH "aarch64" }} This in fact is YAML comment, but Go templating instruction is evaluated by bldr
        mkdir -p /rootfs/usr/local/share/aavmf
        cp ./opt/kata/share/aavmf/AAVMF_CODE.fd /rootfs/usr/local/share/aavmf/AAVMF_CODE.fd
        # {{ end }} This in fact is YAML comment, but Go templating instruction is evaluated by bldr

        # AAVMF_VARS.fd is not shipped: kata ignores firmware_volume for
        # non-confidential guests, so blank it instead of pointing at a missing file
        mkdir -p /rootfs/usr/local/share/kata-containers
        sed -e 's|/opt/kata|/usr/local|g' \
          -e 's|^firmware_volume = .*|firmware_volume = ""|' \
          ./opt/kata/share/defaults/kata-containers/configuration-qemu.toml \
          > /rootfs/usr/local/share/kata-containers/configuration-qemu.toml

        mkdir -p /rootfs/etc/cri/conf.d
        cp /pkg/11-kata-qemu.part /rootfs/etc/cri/conf.d/11-kata-qemu.part
    test:
      - |
        mkdir -p /extensions-validator-rootfs
        cp -r /rootfs/ /extensions-validator-rootfs/rootfs
        cp /pkg/manifest.yaml /extensions-validator-rootfs/manifest.yaml
        /extensions-validator validate --rootfs=/extensions-validator-rootfs --pkg-name="${PKG_NAME}"
    sbom:
      outputPath: /rootfs/usr/local/share/spdx/kata-containers.spdx.json
      version: {{ .KATA_CONTAINERS_VERSION }}
      cpes:
        - cpe:2.3:a:katacontainers:kata_containers:{{ .KATA_CONTAINERS_VERSION }}:*:*:*:*:*:*:*
      licenses:
        - Apache-2.0
finalize:
  - from: /rootfs
    to: /rootfs
  - from: /pkg/manifest.yaml
    to: /
