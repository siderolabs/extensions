name: nvidia-fabricmanager-wrapper
variant: scratch
shell: /bin/bash
dependencies:
  - image: cgr.dev/chainguard/wolfi-base@{{ .WOLFI_BASE_REF }}
install:
  - bash
  - build-base
  - cmake
  - ninja
  - python3
  - libnl3-dev
  - go
steps:
  - sources:
      - url: https://github.com/linux-rdma/rdma-core/releases/download/v57.0/rdma-core-{{ .RDMACORE_VERSION }}.tar.gz
        destination: rdma-core.tar.gz
        sha256: {{ .RDMACORE_SHA256 }}
        sha512: {{ .RDMACORE_SHA512 }}
  - env:
      GOPATH: /tmp/go
  - cachePaths:
      - /.cache/go-build
      - /tmp/go/pkg
  - network: default
    prepare:
      - |
        mkdir rdma-core
        tar -xzf rdma-core.tar.gz --strip-components=1 -C rdma-core
      - |
        cp -r /pkg/* .
      - |
        go mod download
  - network: none
    build:
      - |
        cd rdma-core
        cmake -GNinja \
            -DENABLE_STATIC=1 \
            -DNO_MAN_PAGES=1 \
            -DNO_PYVERBS=1 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX:PATH=/usr
        ninja install
      - |
        go build -o nvidia-fabricmanager-wrapper nvidia-fabricmanager-wrapper
    install:
      - |
        mkdir -p /rootfs/usr/local/lib/containers/nvidia-fabricmanager/usr/lib
        cp /usr/lib/libibumad.so.3 /rootfs/usr/local/lib/containers/nvidia-fabricmanager/usr/lib/
      - |
        mkdir -p /rootfs/usr/local/lib/containers/nvidia-fabricmanager/usr/bin
        cp nvidia-fabricmanager-wrapper /rootfs/usr/local/lib/containers/nvidia-fabricmanager/usr/bin/
finalize:
  - from: /rootfs
    to: /rootfs
