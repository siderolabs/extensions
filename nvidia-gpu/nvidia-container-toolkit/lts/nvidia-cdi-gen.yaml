name: nvidia-cdi-gen
container:
  entrypoint: /usr/local/bin/nvidia-ctk
  args:
    - cdi
    - generate
    - --output
    - /run/cdi/nvidia.yaml
  mounts:
    # device files
    - source: /dev
      destination: /dev
      type: bind
      options:
        - rshared
        - rbind
        - ro
    # shared libraries
    # for amd64 it's /lib64/ld-linux-x86-64.so.2
    - source: /lib64
      destination: /lib64
      type: bind
      options:
        - bind
        - ro
    # shared libraries
    # for arm64 it's /lib/ld-linux-aarch64.so.1
    - source: /lib
      destination: /lib
      type: bind
      options:
        - bind
        - ro
    # shared libraries /usr/local/lib, nvidia files in /usr/local/share
    - source: /usr/local
      destination: /usr/local
      type: bind
      options:
        - bind
        - ro
    # nvidia files in /usr/share
    - source: /usr/share
      destination: /usr/share
      type: bind
      options:
        - bind
        - ro
    # firmware files
    - source: /lib/firmware
      destination: /lib/firmware
      type: bind
      options:
        - bind
        - ro
    # glibc etc files, nvidia etc files
    - source: /etc
      destination: /etc
      type: bind
      options:
        - bind
        - ro
    # nvidia-persistenced service state file
    - source: /var/run/nvidia-persistenced
      destination: /var/run/nvidia-persistenced
      type: bind
      options:
        - rshared
        - rbind
        - ro
    # binaries
    - source: /usr/local/bin
      destination: /usr/local/bin
      type: bind
      options:
        - bind
        - ro
    - source: /run/cdi
      destination: /run/cdi
      type: bind
      options:
        - bind
        - rw
depends:
  - service: ext-nvidia-persistenced
restart: untilSuccess
