# https://download.nvidia.com/XFree86/Linux-x86_64/515.65.01/README/nvidia-persistenced.html
name: nvidia-persistenced
container:
  entrypoint: /usr/local/bin/nvidia-persistenced-wrapper
  mounts:
    # device files
    - source: /dev
      destination: /dev
      type: bind
      options:
        - rshared
        - rbind
        - rw
    # shared libraries
    # for amd64 it's /lib64/ld-linux-x86-64.so.2
    - source: /lib64
      destination: /lib64
      type: bind
      options:
        - bind
        - ro
    # shared libraries
    # for arm64 it's /lib/ld-linux-aarch64.so.1
    - source: /lib
      destination: /lib
      type: bind
      options:
        - bind
        - ro
    # shared libraries
    - source: /usr/local/lib
      destination: /usr/local/lib
      type: bind
      options:
        - bind
        - ro
    # nvidia libraries
    - source: /usr/local/lib
      destination: /usr/local/lib
      type: bind
      options:
        - bind
        - ro
    # service state file
    - source: /run
      destination: /var/run
      type: bind
      options:
        - rshared
        - rbind
        - rw
    # binaries
    - source: /usr/local/bin
      destination: /usr/local/bin
      type: bind
      options:
        - bind
        - ro
depends:
  # we need to depend on udevd so that the nvidia device files are created
  - service: udevd
  - path: /sys/bus/pci/drivers/nvidia
restart: always
