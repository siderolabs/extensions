name: nvidia-cdi-gen
container:
  entrypoint: /usr/local/bin/nvidia-ctk
  args:
    - cdi
    - generate
    - --library-search-path
    - /usr/local/glibc/usr/lib
    - --output
    - /run/cdi/nvidia.yaml
  mounts:
    # device files
    - source: /dev
      destination: /dev
      type: bind
      options:
        - rshared
        - rbind
        - ro
    # shared libraries
    - source: /lib64
      destination: /lib64
      type: bind
      options:
        - bind
        - ro
    # shared libraries
    - source: /lib
      destination: /lib
      type: bind
      options:
        - bind
        - ro
    # shared libraries
    - source: /usr/local/glibc
      destination: /usr/local/glibc
      type: bind
      options:
        - bind
        - ro
    # nvidia-persistenced service state file
    - source: /var/run/nvidia-persistenced
      destination: /var/run/nvidia-persistenced
      type: bind
      options:
        - rshared
        - rbind
        - ro
    # binaries
    - source: /usr/local/bin
      destination: /usr/local/bin
      type: bind
      options:
        - bind
        - ro
    - source: /run/cdi
      destination: /run/cdi
      type: bind
      options:
        - bind
        - rw
depends:
  - service: ext-nvidia-persistenced
restart: untilSuccess
