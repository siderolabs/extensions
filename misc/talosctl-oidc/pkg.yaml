name: talosctl-oidc
variant: scratch
shell: /bin/bash
dependencies:
  - stage: base
steps:
  - sources:
      # {{ if eq .ARCH "aarch64" }} YAML comment; Go template evaluated by bldr
      - url: https://github.com/qjoly/talosctl-oidc/releases/download/{{ .TALOSCTL_OIDC_VERSION }}/talosctl-oidc-linux-arm64
        destination: talosctl-oidc
        sha256: {{ .TALOSCTL_OIDC_ARM64_SHA256 }}
        sha512: {{ .TALOSCTL_OIDC_ARM64_SHA512 }}
      # {{ else if eq .ARCH "x86_64" }} YAML comment; Go template evaluated by bldr
      - url: https://github.com/qjoly/talosctl-oidc/releases/download/{{ .TALOSCTL_OIDC_VERSION }}/talosctl-oidc-linux-amd64
        destination: talosctl-oidc
        sha256: {{ .TALOSCTL_OIDC_AMD64_SHA256 }}
        sha512: {{ .TALOSCTL_OIDC_AMD64_SHA512 }}
      # {{ end }} YAML comment; Go template evaluated by bldr
    install:
      - |
        mkdir -p /rootfs/usr/local/lib/containers/talosctl-oidc/usr/local/bin
        mv talosctl-oidc /rootfs/usr/local/lib/containers/talosctl-oidc/usr/local/bin
        chmod +x /rootfs/usr/local/lib/containers/talosctl-oidc/usr/local/bin/talosctl-oidc
      - |
        mkdir -p /rootfs/usr/local/etc/containers
        cp /pkg/talosctl-oidc.yaml /rootfs/usr/local/etc/containers/
    test:
      - |
        mkdir -p /extensions-validator-rootfs
        cp -r /rootfs/ /extensions-validator-rootfs/rootfs
        cp /pkg/manifest.yaml /extensions-validator-rootfs/manifest.yaml
        /extensions-validator validate --rootfs=/extensions-validator-rootfs --pkg-name="${PKG_NAME}"
      - |
        [[ $(/rootfs/usr/local/lib/containers/talosctl-oidc/usr/local/bin/talosctl-oidc version) == *{{ .TALOSCTL_OIDC_VERSION }}* ]]
    sbom:
      outputPath: /rootfs/usr/local/share/spdx/talosctl-oidc.spdx.json
      version: {{ .TALOSCTL_OIDC_VERSION }}
      cpes:
        - cpe:2.3:a:qjoly:talosctl-oidc:{{ .TALOSCTL_OIDC_VERSION }}:*:*:*:*:*:*:*
      licenses:
        - Apache-2.0
finalize:
  - from: /rootfs
    to: /rootfs
  - from: /pkg/manifest.yaml
    to: /
