name: grype-scan
variant: scratch
shell: /bin/bash
dependencies:
  - stage: base
  - stage: bird2
  - stage: cloudflared
  - stage: crun
  - stage: ecr-credential-provider
  - stage: fuse3
  - stage: glibc
  - stage: gvisor
  - stage: intel-ucode
  - stage: iscsi-tools
  - stage: kata-containers
  - stage: libevent
  - stage: libnvme
  - stage: lldpd
  - stage: metal-agent
  - stage: nebula
  - stage: netbird
  - stage: newt
  - stage: nut-client
  - stage: nvidia-container-runtime
  - stage: nvme-cli
  - stage: pcre2
  - stage: qemu-guest-agent
  - stage: rpc-statd
  - stage: rpcbind
  - stage: soci-snapshotter
  - stage: spin
  - stage: sqlite
  - stage: stargz-snapshotter
  - stage: tailscale
  - stage: vmtoolsd-guest-agent
  - stage: wasmedge
  - stage: xen-guest-agent
  - stage: youki
  - stage: zerotier
  - stage: nonfree-kmod-nvidia-lts
  - stage: nonfree-kmod-nvidia-production
steps:
  - env:
      SYFT_FORMAT_PRETTY: 1
      SYFT_FORMAT_SPDX_JSON_DETERMINISTIC_UUID: 1
      SOURCE_DATE_EPOCH: {{ .BUILD_ARG_SOURCE_DATE_EPOCH }}
      GOPATH: /tmp/go
      GRYPE_EXTRA_ARGS: "{{ .BUILD_ARG_GRYPE_EXTRA_ARGS }}"
  - network: default
    cachePaths:
      - /.cache/go-build
      - /tmp/go/pkg
      - /root/.cache/grype/db
    prepare:
      - |
        cd /pkg
        go mod download
  - cachePaths:
      - /.cache/go-build
      - /tmp/go/pkg
      - /root/.cache/grype/db
    build:
      - |
        mkdir -p /results
        cd /pkg

        go tool -modfile=go.mod \
        github.com/anchore/syft/cmd/syft \
        scan --from dir /rootfs/usr/local/share/spdx \
        --select-catalogers "+sbom-cataloger" \
        --source-name "Talos extensions" --source-version {{ .BUILD_ARG_TAG }} \
        -o spdx-json > /results/combined.spdx.json
  - network: default
    cachePaths:
      - /.cache/go-build
      - /tmp/go/pkg
      - /root/.cache/grype/db
    build:
      - |
        mkdir -p /results
        cd /pkg

        GRYPE_COMMAND_ARGS=(
          "sbom:/results/combined.spdx.json"
          "-vv"
        )

        if [ "${GRYPE_EXTRA_ARGS}" != '<no value>' ]; then
          GRYPE_COMMAND_ARGS+=(${GRYPE_EXTRA_ARGS})
        fi

        go tool -modfile=go.mod \
        github.com/anchore/grype/cmd/grype \
        "${GRYPE_COMMAND_ARGS[@]}" 2>&1 | tee /results/grype-scan.log
finalize:
  - from: /results
    to: /
